<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Recovery</title>
<style>
  body { font-family: sans-serif; max-width: 420px; margin: 80px auto; padding: 20px; background: #f8fafc; }
  h2 { color: #1e293b; }
  p { color: #64748b; font-size: 14px; }
  button {
    background: #2563eb; color: white; border: none; padding: 12px 24px;
    border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; margin-top: 12px;
  }
  button:hover { background: #1d4ed8; }
  #result {
    margin-top: 16px; padding: 14px; border-radius: 8px;
    font-size: 14px; display: none; white-space: pre-wrap; word-break: break-all;
  }
  .ok  { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
  .err { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
</style>
</head>
<body>
  <h2>🔑 Emergency Account Recovery</h2>
  <p>
    This page resets your password using the <code>RESET_PASSWORD_FOR</code>
    environment variable you set in Railway.<br><br>
    Make sure you've added that variable first, then click the button below.
  </p>
  <button onclick="recover()">Reset My Password Now</button>
  <div id="result"></div>

<script>
async function recover() {
  const btn = document.querySelector('button');
  const box = document.getElementById('result');
  btn.textContent = 'Resetting…';
  btn.disabled = true;
  box.style.display = 'none';
  try {
    const r = await fetch('/api/auth/recover', { method: 'POST' });
    const d = await r.json();
    box.style.display = 'block';
    if (r.ok) {
      box.className = 'ok';
      box.textContent = '✅ Success!\n\n' + JSON.stringify(d, null, 2) + '\n\nYou can now log in. Then REMOVE the RESET_PASSWORD_FOR variable from Railway.';
    } else {
      box.className = 'err';
      box.textContent = '❌ ' + (d.detail || JSON.stringify(d));
    }
  } catch (e) {
    box.style.display = 'block';
    box.className = 'err';
    box.textContent = '❌ Request failed: ' + e.message;
  }
  btn.textContent = 'Reset My Password Now';
  btn.disabled = false;
}
</script>
</body>
</html>
